<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaktiv Spelkarta med Zoom & Knappar</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            height: 100%; overflow: hidden;
            background-color: #121212;
            user-select: none;
            font-family: sans-serif;
        }

        /* Behållaren */
        #viewport {
            width: 100vw;
            height: 100vh;
            position: relative;
            cursor: grab;
            overflow: hidden;
        }

        #viewport:active { cursor: grabbing; }

        /* Själva Kartbilden */
        #map {
            position: absolute;
            transform-origin: 0 0;
            will-change: transform;
            display: block;
        }

        /* UI-Kontroller (Knappar + Index) */
        #ui-layer {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 15px;
        }

        /* Zoom-knappar styling */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .btn {
            width: 45px;
            height: 45px;
            background: #252525;
            color: #daa520;
            border: 2px solid #444;
            border-radius: 8px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: background 0.2s;
        }

        .btn:hover { background: #333; border-color: #daa520; }
        .btn:active { background: #daa520; color: #111; }

        /* Index-overlay styling */
        #index-box {
            width: 250px;
            border: 3px solid #444;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            background: #1a1a1a;
            overflow: hidden;
            pointer-events: auto; /* Gör att man kan klicka på indexet om man vill */
        }

        .index-header {
            color: #daa520;
            font-size: 14px;
            text-align: center;
            padding: 8px;
            background: #252525;
            border-bottom: 1px solid #444;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <!-- UI Lager: Knappar och Index -->
    <div id="ui-layer">
        <div class="controls">
            <button class="btn" onclick="zoom(0.2)" title="Zooma in">+</button>
            <button class="btn" onclick="zoom(-0.2)" title="Zooma ut">−</button>
            <button class="btn" onclick="resetMap()" title="Återställ vy" style="font-size: 18px;">🏠</button>
        </div>

        <div id="index-box">
            <div class="index-header">Kart-Index</div>
            <img src="CardforestMapIndex.png" style="width: 100%; display: block;" alt="Index">
        </div>
    </div>

    <!-- Kartan -->
    <div id="viewport">
        <img id="map" src="BestMapYet.jpg" alt="Spelkarta">
    </div>

    <script>
        const viewport = document.getElementById('viewport');
        const map = document.getElementById('map');

        let scale = 1;
        let pos = { x: 50, y: 50 }; // Startposition
        let isDragging = false;
        let start = { x: 0, y: 0 };

        // Uppdatera kartans läge
        function update() {
            map.style.transform = `translate(${pos.x}px, ${pos.y}px) scale(${scale})`;
        }

        // --- KNAPP-ZOOM ---
        function zoom(delta) {
            const oldScale = scale;
            scale = Math.min(Math.max(0.1, scale + delta), 5);
            
            // Justera positionen så vi zoomar mot mitten av skärmen
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            pos.x = centerX - (centerX - pos.x) * (scale / oldScale);
            pos.y = centerY - (centerY - pos.y) * (scale / oldScale);
            
            update();
        }

        function resetMap() {
            scale = 1;
            pos = { x: 50, y: 50 };
            update();
        }

        // --- MUS-ZOOM (Scroll) ---
        viewport.onwheel = (e) => {
            e.preventDefault();
            const delta = -Math.sign(e.deltaY) * 0.15;
            zoom(delta);
        };

        // --- DRAG-FUNKTION ---
        viewport.onmousedown = (e) => {
            if(e.target.closest('#ui-layer')) return; // Hindra drag om man klickar på UI
            isDragging = true;
            start = { x: e.clientX - pos.x, y: e.clientY - pos.y };
        };

        window.onmousemove = (e) => {
            if (!isDragging) return;
            pos.x = e.clientX - start.x;
            pos.y = e.clientY - start.y;
            update();
        };

        window.onmouseup = () => isDragging = false;

        // Starta med en uppdatering
        update();
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gio's Interactive CSFF Map</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            height: 100%; overflow: hidden;
            background-color: #121212;
            user-select: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Behållaren för kartan */
        #viewport {
            width: 100vw;
            height: 100vh;
            position: relative;
            cursor: grab;
            overflow: hidden;
            background-image: radial-gradient(#222 1px, transparent 1px); /* Subtilt rutmönster */
            background-size: 20px 20px;
        }

        #viewport:active { cursor: grabbing; }

        /* Själva Kartbilden */
        #map {
            position: absolute;
            transform-origin: 0 0;
            will-change: transform;
            display: block;
        }

        /* Nytt UI-lager: Sidopanel */
        #ui-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 320px; /* Bredden på ditt index-lager */
            height: 100vh;
            background: rgba(20, 20, 20, 0.95);
            border-left: 3px solid #daa520;
            box-shadow: -10px 0 30px rgba(0,0,0,0.7);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            pointer-events: auto; /* Man kan klicka på panelen */
        }

        .index-header {
            color: #daa520;
            font-size: 18px;
            text-align: center;
            padding: 20px 10px;
            background: #1a1a1a;
            border-bottom: 1px solid #444;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
        }

        .index-content {
            flex-grow: 1;
            overflow-y: auto; /* Om index-bilden är väldigt lång kan man scrolla i panelen */
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #index-img {
            width: 100%;
            height: auto;
            border: 1px solid #333;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* Zoom-knappar placerade utanför panelen (till vänster om den) */
        .controls {
            position: absolute;
            left: -60px;
            top: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: auto;
        }

        .btn {
            width: 45px;
            height: 45px;
            background: #1a1a1a;
            color: #daa520;
            border: 2px solid #daa520;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: all 0.2s;
        }

        .btn:hover { background: #daa520; color: #111; }
        .btn:active { transform: scale(0.9); }

        .info-text {
            color: #888;
            font-size: 12px;
            padding: 15px;
            text-align: center;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <!-- UI Panel (Top Layer) -->
    <div id="ui-panel">
        <div class="controls">
            <button class="btn" onclick="zoom(0.2)" title="Zooma in">+</button>
            <button class="btn" onclick="zoom(-0.2)" title="Zooma ut">−</button>
            <button class="btn" onclick="resetMap()" title="Återställ vy">🏠</button>
        </div>

        <div class="index-header">Kart-Index</div>
        
        <div class="index-content">
            <!-- Din index-bild här -->
            <img id="index-img" src="CardforestMapIndex.png" alt="Index">
            
            <div class="info-text">
                Dra för att panorera<br>
                Scrolla för att zooma
            </div>
        </div>
    </div>

    <!-- Kart-området -->
    <div id="viewport">
        <img id="map" src="BestMapYet.jpg" alt="Spelkarta">
    </div>

    <script>
        const viewport = document.getElementById('viewport');
        const map = document.getElementById('map');
        const uiPanel = document.getElementById('ui-panel');

        let scale = 1;
        let pos = { x: 50, y: 50 };
        let isDragging = false;
        let start = { x: 0, y: 0 };

        function update() {
            map.style.transform = `translate(${pos.x}px, ${pos.y}px) scale(${scale})`;
        }

        function zoom(delta) {
            const oldScale = scale;
            scale = Math.min(Math.max(0.1, scale + delta), 5);
            
            // Zoomar mot mitten av den synliga kartytan (vänster om panelen)
            const centerX = (window.innerWidth - 320) / 2;
            const centerY = window.innerHeight / 2;
            
            pos.x = centerX - (centerX - pos.x) * (scale / oldScale);
            pos.y = centerY - (centerY - pos.y) * (scale / oldScale);
            
            update();
        }

        function resetMap() {
            scale = 0.8; // Lite utzoomat för att se mer direkt
            pos = { x: 50, y: 50 };
            update();
        }

        viewport.onwheel = (e) => {
            e.preventDefault();
            const delta = -Math.sign(e.deltaY) * 0.2;
            zoom(delta);
        };

        viewport.onmousedown = (e) => {
            // Hindra drag om man klickar på panelen eller dess knappar
            if (uiPanel.contains(e.target)) return;
            
            isDragging = true;
            start = { x: e.clientX - pos.x, y: e.clientY - pos.y };
        };

        window.onmousemove = (e) => {
            if (!isDragging) return;
            pos.x = e.clientX - start.x;
            pos.y = e.clientY - start.y;
            update();
        };

        window.onmouseup = () => isDragging = false;

        // Initiera kartan
        update();
    </script>

</body>
</html>
